<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7931a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Chart bars -->
  <rect x="80" y="280" width="50" height="120" rx="8" fill="#4ecca3" opacity="0.8"/>
  <rect x="150" y="200" width="50" height="200" rx="8" fill="#4ecca3" opacity="0.9"/>
  <rect x="220" y="240" width="50" height="160" rx="8" fill="#ff6b35" opacity="0.8"/>
  <rect x="290" y="160" width="50" height="240" rx="8" fill="#4ecca3" opacity="0.9"/>
  <rect x="360" y="120" width="50" height="280" rx="8" fill="url(#accent)" opacity="1"/>
  <!-- Trend line -->
  <polyline points="105,260 175,180 245,220 315,140 385,100" 
            fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Arrow up -->
  <polygon points="370,90 385,70 400,90" fill="#ff6b35"/>
  <!-- V10 text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="72" fill="white" opacity="0.95">V10</text>
</svg>
